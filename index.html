<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>未成年人网络保护 · 每日动态日报</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap');

:root {
  --bg: #f0f4f8;
  --card-bg: #ffffff;
  --text-main: #1a2e3d;
  --text-sub: #4a6b7f;
  --text-muted: #8ba3b5;
  --blue: #1890ff;
  --blue-dark: #0d47a1;
  --teal: #36cfc9;
  --red: #dc2626;
  --green: #10b981;
  --amber: #d97706;
  --purple: #7c3aed;
  --border: #e2e8f0;
  --shadow: 0 1px 3px rgba(0,0,0,0.06);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--text-main);
  line-height: 1.7;
}
.container { max-width: 920px; margin: 0 auto; padding: 0 16px; }

/* ══ Site Header ══ */
.site-header {
  background: linear-gradient(135deg, #0d47a1 0%, #1890ff 50%, #36cfc9 100%);
  color: #fff;
  position: relative; overflow: hidden;
}
.header-particles { position: absolute; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; }
.particle { position: absolute; border-radius: 50%; background: rgba(255,255,255,.05); }
.particle:nth-child(1) { width: 200px; height: 200px; top: -60px; right: -40px; }
.particle:nth-child(2) { width: 140px; height: 140px; bottom: -50px; left: 8%; }
.particle:nth-child(3) { width: 90px; height: 90px; top: 30%; right: 18%; }
.header-inner {
  position: relative; z-index: 2;
  max-width: 920px; margin: 0 auto;
  padding: 40px 24px 32px; text-align: center;
}
.header-badge {
  display: inline-flex; align-items: center; gap: 6px;
  border: 1px solid rgba(255,255,255,.3);
  color: rgba(255,255,255,.8);
  font-size: 11px; font-weight: 600; letter-spacing: .12em;
  padding: 4px 16px; border-radius: 20px; margin-bottom: 16px;
}
.header-badge-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #36cfc9; box-shadow: 0 0 6px rgba(54,207,201,.6);
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
.header-title { font-size: 28px; font-weight: 700; letter-spacing: .06em; margin-bottom: 6px; }
.header-title .accent { color: #80e8e0; }
.header-sub { font-size: 12px; color: rgba(255,255,255,.5); letter-spacing: .15em; margin-bottom: 18px; text-transform: uppercase; }
.header-tags { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
.header-tag { font-size: 11px; color: rgba(255,255,255,.6); border: 1px solid rgba(255,255,255,.15); padding: 3px 12px; border-radius: 20px; }
.wave-divider { display: block; width: 100%; }

/* ══ Stats ══ */
.stats-bar { display: flex; gap: 12px; margin: 24px 0; flex-wrap: wrap; }
.stat-card {
  flex: 1; min-width: 130px; background: var(--card-bg);
  border: 1px solid var(--border); border-radius: 10px;
  padding: 16px; text-align: center; box-shadow: var(--shadow);
}
.stat-num { font-size: 28px; font-weight: 700; color: var(--blue); }
.stat-label { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

/* ══ Block Title (用于"今日简报"和"历史存档"标题) ══ */
.block-title {
  display: flex; align-items: center; gap: 12px;
  margin: 32px 0 16px;
}
.block-title-line {
  flex: 1; height: 1px;
  background: linear-gradient(90deg, var(--blue) 0%, transparent 100%);
}
.block-title-line.left {
  background: linear-gradient(270deg, var(--blue) 0%, transparent 100%);
}
.block-title-text {
  font-size: 15px; font-weight: 700; letter-spacing: .06em;
  color: var(--blue-dark); white-space: nowrap;
  display: flex; align-items: center; gap: 8px;
}
.block-title-icon {
  display: inline-flex; align-items: center; justify-content: center;
  width: 26px; height: 26px; background: var(--blue); border-radius: 6px;
  font-size: 12px; color: #fff;
}
.latest-chip {
  background: linear-gradient(135deg, var(--blue), var(--teal));
  color: #fff; font-size: 10px; font-weight: 700;
  padding: 2px 10px; border-radius: 20px;
}

/* ══ Today Report Container ══ */
#todayReport { margin-bottom: 12px; }

/* ══ 历史存档折叠 ══ */
.archive-stack { display: flex; flex-direction: column; gap: 8px; margin-bottom: 40px; }
.acc-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-left: 3px solid #91caff;
  border-radius: 10px; overflow: hidden;
  box-shadow: var(--shadow); transition: border-left-color .2s;
}
.acc-card:hover, .acc-card.open { border-left-color: var(--blue); }
.acc-head {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 18px; cursor: pointer; user-select: none;
  transition: background .15s;
}
.acc-head:hover { background: #f0f7ff; }
.acc-card.open .acc-head { background: #e6f4ff; }
.acc-dot { width: 8px; height: 8px; border-radius: 50%; background: #91caff; flex-shrink: 0; transition: background .2s; }
.acc-card.open .acc-dot { background: var(--blue); }
.acc-date { font-size: 15px; font-weight: 700; color: var(--text-main); }
.acc-weekday { font-size: 12px; color: var(--blue); font-weight: 600; margin-left: 8px; }
.acc-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; line-height: 1.4; }
.acc-spacer { flex: 1; }
.acc-count {
  font-size: 11px; color: var(--text-muted);
  background: #f0f4f8; padding: 2px 10px; border-radius: 10px;
  margin-right: 8px; white-space: nowrap;
}
.acc-arrow { font-size: 10px; color: var(--text-muted); transition: transform .25s; font-style: normal; }
.acc-card.open .acc-arrow { transform: rotate(90deg); }
.acc-body { display: none; border-top: 1px solid var(--border); }
.acc-card.open .acc-body { display: block; }
.acc-body iframe { display: block; width: 100%; height: 800px; border: none; }
.acc-body-foot {
  padding: 10px 18px; background: #f8fafc;
  border-top: 1px solid var(--border); text-align: right;
}
.acc-body-foot a { font-size: 12px; color: var(--blue); text-decoration: none; font-weight: 500; }
.acc-body-foot a:hover { text-decoration: underline; }

/* ══ Footer ══ */
.site-footer {
  border-top: 1px solid var(--border);
  padding: 28px 16px; text-align: center;
  background: #f8fafc;
}
.footer-icon {
  display: inline-flex; align-items: center; justify-content: center;
  width: 44px; height: 44px;
  background: linear-gradient(135deg, var(--blue), var(--teal));
  border-radius: 10px; margin-bottom: 12px; font-size: 20px;
}
.footer-text { font-size: 11px; color: var(--text-muted); line-height: 1.8; }
.footer-text a { color: var(--blue); text-decoration: none; }

/* ══ Responsive ══ */
@media (max-width: 600px) {
  .header-title { font-size: 22px; }
  .stats-bar { gap: 8px; }
  .stat-card { min-width: 100px; padding: 12px; }
  .stat-num { font-size: 22px; }
}
</style>
</head>
<body>

<!-- ══ HEADER ══ -->
<header class="site-header">
  <div class="header-particles">
    <div class="particle"></div><div class="particle"></div><div class="particle"></div>
  </div>
  <div class="header-inner">
    <div class="header-badge">
      <span class="header-badge-dot"></span>
      DAILY BRIEFING · YOUTH PROTECTION
    </div>
    <div class="header-title">
      未成年人网络保护<br><span class="accent">每日动态日报</span>
    </div>
    <div id="headerDate" style="font-size:14px;color:rgba(255,255,255,.6);margin-bottom:16px;letter-spacing:.05em;"></div>
    <div class="header-tags">
      <span class="header-tag">🏢 大型互联网及游戏公司动态</span>
      <span class="header-tag">🇨🇳 国内未保监管动态</span>
      <span class="header-tag">🌍 国外监管及公司动态</span>
    </div>
  </div>
  <svg class="wave-divider" viewBox="0 0 1440 36" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M0,18 Q180,36 360,18 T720,18 T1080,18 T1440,18 L1440,36 L0,36Z" fill="#f0f4f8" opacity=".5"/>
    <path d="M0,22 Q180,4 360,22 T720,22 T1080,22 T1440,22 L1440,36 L0,36Z" fill="#f0f4f8"/>
  </svg>
</header>

<main class="container">

  <!-- 今日简报内容（直接渲染） -->
  <div id="todayReport">
    <div style="text-align:center;padding:48px 0;color:#8ba3b5;font-size:14px;">正在加载今日简报…</div>
  </div>

  <!-- 历史存档标题 -->
  <div class="block-title">
    <div class="block-title-line left"></div>
    <div class="block-title-text">
      <span class="block-title-icon">📚</span> 历史存档
    </div>
    <div class="block-title-line"></div>
  </div>

  <!-- 历史存档列表 -->
  <div class="archive-stack" id="archiveList">
    <div style="text-align:center;padding:24px 0;color:#8ba3b5;font-size:14px;">加载中…</div>
  </div>

</main>

<!-- ══ FOOTER ══ -->
<footer class="site-footer">
  <div class="footer-icon">🛡️</div>
  <div class="footer-text">
    未成年人网络保护 · 每日动态日报<br>
    覆盖游戏 · 社交 · 直播 · 短视频 · 短剧 · 智能终端 · 网络消费 七大数字场景<br>
    由 WorkBuddy 自动化驱动 · 每日更新
  </div>
</footer>

<script>
(function () {
  var WEEKDAYS = ['周日','周一','周二','周三','周四','周五','周六'];
  function getWeekday(d) { return WEEKDAYS[new Date(d).getDay()]; }

  fetch('./reports-index.json?_=' + Date.now())
    .then(function (r) { return r.json(); })
    .then(function (data) {
      if (!data || data.length === 0) {
        document.getElementById('todayReport').innerHTML = '<div style="text-align:center;padding:48px 0;color:#8ba3b5;">暂无简报，将在下次自动任务运行后发布。</div>';
        document.getElementById('archiveList').innerHTML = '';
        return;
      }

      /* 统计（保留用于历史存档计数） */
      var totalReports = data.length;

      var latest = data[0];
      var archives = data.slice(1);

      /* 填充header日期 */
      document.getElementById('headerDate').textContent = latest.date + ' ' + getWeekday(latest.date);

      /* ═══ 今日简报：fetch HTML 并直接嵌入页面 ═══ */
      fetch('./reports/' + latest.file + '?_=' + Date.now())
        .then(function (r) { return r.text(); })
        .then(function (html) {
          /* 提取 body 内容 */
          var bodyMatch = html.match(/<body[^>]*>([\s\S]*)<\/body>/i);
          var content = bodyMatch ? bodyMatch[1] : html;

          /* 移除日报自带的 header 和 footer（门户页已有） */
          content = content.replace(/<header[\s\S]*?<\/header>/gi, '');
          content = content.replace(/<footer[\s\S]*?<\/footer>/gi, '');
          /* 移除日报内的分类标签行（门户页header已有）—— 只删那一个div，不贪婪 */
          content = content.replace(/<div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:20px 0 0;">[\s\S]*?<\/span>\s*<\/div>/i, '');

          /* 提取 style 并注入 */
          var styleMatch = html.match(/<style[^>]*>([\s\S]*?)<\/style>/i);
          if (styleMatch) {
            var scopedStyle = document.createElement('style');
            scopedStyle.textContent = styleMatch[1];
            document.head.appendChild(scopedStyle);
          }

          document.getElementById('todayReport').innerHTML = content;
        })
        .catch(function () {
          document.getElementById('todayReport').innerHTML = '<div style="text-align:center;padding:48px 0;color:#8ba3b5;">加载失败，请刷新重试。</div>';
        });

      /* ═══ 历史存档 ═══ */
      var archiveList = document.getElementById('archiveList');
      if (archives.length === 0) {
        archiveList.innerHTML = '<div style="text-align:center;padding:20px 0;color:#8ba3b5;">暂无更多历史简报</div>';
        return;
      }

      archiveList.innerHTML = archives.map(function (item, i) {
        var summary = item.summary || '点击展开阅读';
        if (summary.length > 60) summary = summary.substring(0, 60) + '…';
        return (
          '<div class="acc-card" id="acc-' + i + '">' +
            '<div class="acc-head" onclick="toggleAcc(' + i + ')">' +
              '<span class="acc-dot"></span>' +
              '<div style="flex:1;min-width:0;">' +
                '<div class="acc-date">' + item.date + '<span class="acc-weekday">' + getWeekday(item.date) + '</span></div>' +
                '<div class="acc-sub">' + summary + '</div>' +
              '</div>' +
              (item.count ? '<span class="acc-count">' + item.count + '条动态</span>' : '') +
              '<span class="acc-arrow">▶</span>' +
            '</div>' +
            '<div class="acc-body" data-file="' + item.file + '"></div>' +
          '</div>'
        );
      }).join('');
    })
    .catch(function () {
      document.getElementById('todayReport').innerHTML = '<div style="text-align:center;padding:48px 0;color:#8ba3b5;">暂无简报记录。</div>';
      document.getElementById('archiveList').innerHTML = '';
    });

  /* 折叠展开 + 懒加载内容 */
  window.toggleAcc = function (i) {
    var card = document.getElementById('acc-' + i);
    var isOpen = card.classList.contains('open');

    /* 关闭其他 */
    document.querySelectorAll('.acc-card.open').forEach(function (c) { c.classList.remove('open'); });

    if (!isOpen) {
      card.classList.add('open');
      var body = card.querySelector('.acc-body');

      /* 首次展开时加载内容 */
      if (!body.dataset.loaded) {
        body.dataset.loaded = '1';
        body.innerHTML = '<div style="text-align:center;padding:24px;color:#8ba3b5;">加载中…</div>';

        fetch('./reports/' + body.dataset.file + '?_=' + Date.now())
          .then(function (r) { return r.text(); })
          .then(function (html) {
            var bodyMatch = html.match(/<body[^>]*>([\s\S]*)<\/body>/i);
            var content = bodyMatch ? bodyMatch[1] : html;
            body.innerHTML = content +
              '<div class="acc-body-foot"><a href="./reports/' + body.dataset.file + '" target="_blank">在新标签页打开 ↗</a></div>';
          })
          .catch(function () {
            body.innerHTML = '<div style="text-align:center;padding:24px;color:#8ba3b5;">加载失败</div>';
          });
      }

      setTimeout(function () {
        card.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 150);
    }
  };
})();
</script>
</body>
</html>
